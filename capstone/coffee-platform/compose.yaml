services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rust}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rust}
      POSTGRES_DB: ${POSTGRES_DB:-coffee_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 15
    tmpfs: [/var/lib/postgresql/data]
  redis:
    image: redis:8.0.2-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
    tmpfs: [/data]
